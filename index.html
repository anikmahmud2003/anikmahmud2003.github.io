<!DOCTYPE html>
<html>
<head>
  <title>Name Entry</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input { padding: 8px; width: 200px; }
    button { padding: 8px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:disabled { background: gray; }
    .status { margin-top: 10px; color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>Enter Name</h2>
  <input type="text" id="name" placeholder="Your name">
  <button id="btnSubmit" onclick="submitForm()">Submit</button>
  <div id="status" class="status"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxIQ-vlKSO9TdYUMmzylW0iaB6SusFLOQPe5XkYDUyHA0ZWQoky633_oHFeIg89Hjkm/exec";

async function submitForm() {
  var btn = document.getElementById("btnSubmit");
  var status = document.getElementById("status");
  var name = document.getElementById("name").value;

  btn.disabled = true;
  status.innerText = "Saving...";

  try {
    if (!name.trim()) {
      status.innerText = "Please enter a name.";
      status.className = "status error";
      return;
    }
    var response = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ name: name }),
      headers: { "Content-Type": "application/json" }
    });
    var text = await response.text();
    if (text !== "Success") {
      throw new Error(text);
    }
    status.innerText = "Name saved!";
    status.className = "status";
    document.getElementById("name").value = "";
  } catch (error) {
    status.innerText = "Error: " + error.message;
    status.className = "status error";
  }
  btn.disabled = false;
}
</script>
</body>
</html>
